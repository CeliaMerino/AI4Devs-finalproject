            book_id:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/ReadingStatus'

    CatalogEdition:
      type: object
      required: [title, authors, data_source, external_provider_id]
      properties:
        title:
          type: string
        authors:
          type: string
        cover_image_url:
          type: string
          format: uri
          nullable: true
        page_count:
          type: integer
          nullable: true
        genre:
          type: string
          nullable: true
        isbn_13:
          type: string
          nullable: true
        isbn_10:
          type: string
          nullable: true
        data_source:
          $ref: '#/components/schemas/CatalogDataSource'
