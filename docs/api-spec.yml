          nullable: true
        page_count:
          type: integer
          minimum: 0
          nullable: true
        genre:
          type: string
          nullable: true
        series_name:
          type: string
          nullable: true
        publication_year:
          type: integer
          minimum: 1000
          maximum: 2100
          nullable: true
        audience:
          $ref: '#/components/schemas/BookAudience'
        audience_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true

    BookCreatedResponse:
      type: object
