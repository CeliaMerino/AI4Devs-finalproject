openapi: 3.0.3
info:
  title: Reading Analytics Platform API
  description: |
    REST API for personal reading tracking: library, catalog search, edition covers, and dev authentication.

    - Base path: `/v1`
    - JSON request/response bodies use **snake_case** field names
    - Protected routes require `Authorization: Bearer <JWT>`
    - Catalog integrates Open Library (primary) and Google Books (fallback when API key configured)
  version: 0.1.0
  contact:
    name: Reading Analytics Platform

servers:
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication (MVP dev login)
  - name: Audiences
    description: User-configurable audience labels (Settings)
  - name: Books
    description: User library
  - name: Catalog
    description: External metadata search and covers (no persistence until book create)
  - name: TBR
    description: Monthly To Be Read lists (UC-05)
  - name: Goals
    description: Annual reading goals and progress (UC-06)
  - name: Stats
    description: Monthly reading statistics dashboard (UC-07)
  - name: Import
    description: Goodreads CSV import (US-13)

paths:
  /auth/dev-login:
    post:
      summary: Dev login (local MVP)
      description: Creates or finds user by email and returns JWT. No password in MVP.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '201':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevLoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /audiences:
    get:
      summary: List audiences for current user
      tags: [Audiences]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User audience labels ordered by name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Audience'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create audience label
      tags: [Audiences]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAudienceRequest'
      responses:
        '201':
          description: Audience created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audience'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate audience name (case-insensitive)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /audiences/{id}:
    delete:
      summary: Delete audience label
      description: Removes the audience for the current user. Books referencing it have `audience_id` set to null.
      tags: [Audiences]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Audience deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Audience not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books:
    get:
      summary: List books for current user
      tags: [Books]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User library with reading status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Add book to library
      description: |
        Creates book and initial reading record (`pendiente`).
        Rejects duplicates by `isbn_13` or (`data_source` + `external_provider_id`) per user.
        May enrich `genre` / `page_count` from Open Library or Google Books when missing.
      tags: [Books]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookCreatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate book in library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDuplicateError'

  /books/{bookId}:
    patch:
      summary: Update book metadata
      description: Partial update of user-owned book fields (metadata for manual edit). KAN-35 audience; KAN-27 full book fields.
      tags: [Books]
      security:
        - bearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBookRequest'
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Validation error or empty body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Book not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{bookId}/reading-record:
    patch:
      summary: Update reading status, dates, rating, or format
      description: |
        Partial update of the 1:1 `reading_records` row (UC-02, partial UC-04).
        Returns `meta.openCompletionModal: true` when status transitions to `leido`.
        Returns `meta.tbrAutoCompleted: true` when the book is marked completed in the active month's TBR.
      tags: [Books]
      security:
        - bearerAuth: []
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchReadingRecordRequest'
      responses:
        '200':
          description: Reading record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingRecordPatchedResponse'
        '400':
          description: Validation error or empty body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Book not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Business rule violation (e.g. finish before start)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnprocessableErrorResponse'

  /tbr/{year}/{month}:
    get:
      summary: Get or create monthly TBR
      description: Returns the user's TBR for the given calendar month, creating an empty list if none exists.
      tags: [TBR]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 1970
            maximum: 2100
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Monthly TBR with entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyTbrResponse'
        '400':
          description: Invalid year or month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tbr/{year}/{month}/entries:
    post:
      summary: Add book to monthly TBR
      tags: [TBR]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTbrEntryRequest'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TbrEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Book not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Book already in list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Book reading status is not pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnprocessableErrorResponse'
              example:
                statusCode: 422
                message: Only pending books can be added to TBR
                code: TBR_BOOK_NOT_PENDING

  /tbr/{year}/{month}/entries/{entryId}:
    delete:
      summary: Remove book from monthly TBR
      tags: [TBR]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Entry removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /goals/{year}:
    get:
      summary: Get annual goal with progress and forecast
      description: Returns the user's annual reading goal for the given year, books read count, progress percentage, and optional pace forecast. Always 200; `goal` is null when unset.
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 1970
            maximum: 2100
      responses:
        '200':
          description: Annual goal snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnualGoalResponse'
        '400':
          description: Invalid year
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      summary: Create or update annual goal
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 1970
            maximum: 2100
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertGoalRequest'
      responses:
        '200':
          description: Goal saved with updated progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnualGoalResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stats:
    get:
      summary: Get reading statistics by period query
      description: >-
        Returns read-only reading statistics for the authenticated user for a
        calendar year (`period=year`) or month (`period=month` with `month`).
        Year mode uses the same aggregate fields as monthly stats without `month`.
        Results are computed on read; empty periods return zeroed totals.
      tags: [Stats]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [year, month]
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 1970
            maximum: 2100
        - name: month
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Required when `period=month`
      responses:
        '200':
          description: Period statistics snapshot
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MonthlyStatsResponse'
                  - $ref: '#/components/schemas/YearlyStatsResponse'
        '400':
          description: Invalid period parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stats/{year}/{month}:
    get:
      summary: Get monthly reading statistics
      description: >-
        Returns read-only reading statistics for the authenticated user for the
        given calendar month, computed from `reading_records` joined to `books`.
        A book counts when `status = leido` and `finished_on` is within the
        month. Always 200; an empty month returns zeroed totals and empty
        distributions. No statistics are persisted.
      tags: [Stats]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 1970
            maximum: 2100
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Monthly statistics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyStatsResponse'
        '400':
          description: Invalid year or month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /import/goodreads:
    post:
      summary: Start Goodreads library CSV import job
      description: >-
        Accepts a multipart CSV file (`file`) from Goodreads library export and
        enqueues a background job that parses, imports, dedupes, and enriches
        books. Poll `GET /import/jobs/{jobId}` for progress and final result.
      tags: [Import]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Import job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobAcceptedResponse'
        '400':
          description: Missing file, invalid CSV, or missing headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: CSV exceeds size limit

  /import/jobs/{jobId}:
    get:
      summary: Get Goodreads import job status
      description: Returns progress (`processed_count`, `total_count`, `phase`) and the full import `result` when completed.
      tags: [Import]
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Import job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Job not found for user

  /import/reenrich-pending:
    post:
      summary: Re-enrich books missing genre or cover
      description: >-
        Re-runs catalog enrichment for the authenticated user's books that still
        lack `genre` or `cover_image_url`. Idempotent; respects catalog rate limits.
      tags: [Import]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Re-enrichment summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReenrichPendingSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /books/catalog/search:
    get:
      summary: Search external catalog
      description: Queries Open Library first; may fall back to Google Books. Results are not stored.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query (title, author, ISBN)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 40
            default: 20
      responses:
        '200':
          description: Catalog editions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSearchResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /books/catalog/covers:
    get:
      summary: List cover options for a catalog edition
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: data_source
          in: query
          required: true
          schema:
            type: string
            enum: [open_library, google_books]
        - name: external_provider_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 256
        - name: hint_cover_url
          in: query
          schema:
            type: string
            format: uri
            maxLength: 2048
          description: Optional cover URL from search result to include as default/hint
      responses:
        '200':
          description: Cover options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditionCoversResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

  schemas:
    DevLoginRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: reader@example.com

    DevLoginResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token:
          type: string
        user:
          type: object
          required: [id, email]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email

    DataSource:
      type: string
      enum: [open_library, google_books, goodreads, manual]

    BookAudience:
      type: string
      nullable: true
      enum: [young_adult, new_adult, adult]

    CatalogDataSource:
      type: string
      enum: [open_library, google_books]

    ReadingStatus:
      type: string
      enum: [pendiente, leyendo, leido, dnf]

    ReadFormat:
      type: string
      enum: [fisico, ebook, audio]

    PatchReadingRecordRequest:
      type: object
      minProperties: 1
      properties:
        status:
          $ref: '#/components/schemas/ReadingStatus'
        started_on:
          type: string
          format: date
        finished_on:
          type: string
          format: date
        rating:
          type: number
          minimum: 0.5
          maximum: 5
          multipleOf: 0.5
          description: Half-star rating from 0.5 to 5 in 0.5 steps.
        read_format:
          oneOf:
            - $ref: '#/components/schemas/ReadFormat'
            - type: 'null'

    ReadingRecordResource:
      type: object
      required: [book_id, status, updated_at]
      properties:
        book_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ReadingStatus'
        current_page:
          type: integer
          nullable: true
        progress_percent:
          type: string
          nullable: true
        rating:
          type: number
          nullable: true
          minimum: 0.5
          maximum: 5
          multipleOf: 0.5
        read_format:
          oneOf:
            - $ref: '#/components/schemas/ReadFormat'
            - type: 'null'
        started_on:
          type: string
          format: date
          nullable: true
        finished_on:
          type: string
          format: date
          nullable: true
        updated_at:
          type: string
          format: date-time

    PatchSideEffectsMeta:
      type: object
      properties:
        openCompletionModal:
          type: boolean
        tbrAutoCompleted:
          type: boolean
          description: true when an open entry in the active month's TBR was marked completed

    ReadingRecordPatchedResponse:
      type: object
      required: [reading, book]
      properties:
        reading:
          $ref: '#/components/schemas/ReadingRecordResource'
        book:
          type: object
          required: [id, page_count]
          properties:
            id:
              type: string
              format: uuid
            page_count:
              type: integer
              nullable: true
        meta:
          $ref: '#/components/schemas/PatchSideEffectsMeta'

    UnprocessableErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            code:
              type: string
              example: FINISHED_BEFORE_STARTED

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        code:
          type: string

    Audience:
      type: object
      required: [id, name, is_default, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAudienceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    Book:
      type: object
      required:
        - id
        - user_id
        - title
        - authors
        - data_source
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        authors:
          type: string
        isbn_13:
          type: string
          nullable: true
        isbn_10:
          type: string
          nullable: true
        cover_image_url:
          type: string
          format: uri
          nullable: true
        page_count:
          type: integer
          nullable: true
        genre:
          type: string
          nullable: true
        series_name:
          type: string
          nullable: true
        publication_year:
          type: integer
          nullable: true
        data_source:
          $ref: '#/components/schemas/DataSource'
        external_provider_id:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        audience:
          $ref: '#/components/schemas/BookAudience'
        audience_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BookListItem:
      allOf:
        - $ref: '#/components/schemas/Book'
        - type: object
          required: [reading_status]
          properties:
            reading_status:
              $ref: '#/components/schemas/ReadingStatus'
            started_on:
              type: string
              format: date
              nullable: true
            finished_on:
              type: string
              format: date
              nullable: true
            rating:
              type: number
              nullable: true
              minimum: 0.5
              maximum: 5
              multipleOf: 0.5
            read_format:
              oneOf:
                - $ref: '#/components/schemas/ReadFormat'
                - type: 'null'

    CreateBookRequest:
      type: object
      required: [title, authors, data_source]
      properties:
        title:
          type: string
          minLength: 1
        authors:
          type: string
          minLength: 1
        isbn_13:
          type: string
          nullable: true
        isbn_10:
          type: string
          nullable: true
        cover_image_url:
          type: string
          format: uri
          nullable: true
        page_count:
          type: integer
          minimum: 0
          nullable: true
        genre:
          type: string
          nullable: true
        series_name:
          type: string
          nullable: true
        publication_year:
          type: integer
          minimum: 1000
          maximum: 2100
          nullable: true
        data_source:
          $ref: '#/components/schemas/DataSource'
