          type: string

    CatalogSearchResponse:
      type: object
      required: [items, source]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogEdition'
        source:
          type: string
          enum: [open_library, google_books, none]
          description: Provider that satisfied the search

    CoverOption:
      type: object
      required: [id, url]
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        label:
          type: string
          nullable: true

    EditionCoversResponse:
      type: object
      required: [covers]
      properties:
        covers:
          type: array
          items:
            $ref: '#/components/schemas/CoverOption'
        default_cover_id:
          type: string
          nullable: true

    ErrorMessage:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ErrorMessage'
      example:
        statusCode: 400
        message: ['q must be longer than or equal to 2 characters']

    MonthlyTbrList:
      type: object
      required: [id, year, month, auto_created, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        year:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        auto_created:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TbrBookSummary:
      type: object
      required: [id, title, authors, reading_status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        authors:
          type: string
        cover_image_url:
          type: string
          nullable: true
        reading_status:
          $ref: '#/components/schemas/ReadingStatus'

    TbrEntry:
      type: object
      required: [id, book_id, sort_order, completed, added_at, book]
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        sort_order:
          type: integer
        completed:
          type: boolean
        completed_at:
          type: string
          format: date-time
          nullable: true
        added_at:
          type: string
          format: date-time
        book:
          $ref: '#/components/schemas/TbrBookSummary'

    MonthlyTbrResponse:
      type: object
      required: [list, entries]
      properties:
        list:
          $ref: '#/components/schemas/MonthlyTbrList'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/TbrEntry'

    AddTbrEntryRequest:
      type: object
      required: [book_id]
      properties:
        book_id:
          type: string
          format: uuid

    UpsertGoalRequest:
      type: object
      required: [target_book_count]
      properties:
        target_book_count:
          type: integer
          minimum: 1
          maximum: 365
          example: 50

    GoalForecast:
      type: object
      required:
        - projected_year_end_count
        - on_track
        - pace_books_per_week
        - required_books_per_week
        - status
      properties:
        projected_year_end_count:
          type: integer
        on_track:
          type: boolean
        pace_books_per_week:
          type: number
        required_books_per_week:
          type: number
        status:
          type: string
          enum: [ahead, on_track, behind]

    AnnualGoalResource:
      type: object
      required: [id, target_book_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        target_book_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnnualGoalResponse:
      type: object
      required: [year, goal, books_read, progress_percent, forecast]
      properties:
        year:
          type: integer
        goal:
          oneOf:
            - $ref: '#/components/schemas/AnnualGoalResource'
            - type: 'null'
        books_read:
          type: integer
        progress_percent:
          oneOf:
            - type: integer
            - type: 'null'
        forecast:
          oneOf:
            - $ref: '#/components/schemas/GoalForecast'
            - type: 'null'

    GenreCount:
      type: object
      required: [genre, count]
      properties:
        genre:
          type: string
          description: Genre name, or `unknown` when the book has no genre.
        count:
          type: integer

    FormatCount:
      type: object
      required: [format, count]
      properties:
        format:
          type: string
          description: Read format (`fisico` | `ebook` | `audio`), or `unknown` when unset.
        count:
          type: integer

    AudienceCount:
      type: object
      required: [audience, count]
      properties:
        audience:
          type: string
          description: Book audience (`young_adult` | `new_adult` | `adult`), or `unknown` when unset.
        count:
          type: integer

    RatingCount:
      type: object
      required: [rating, count]
      properties:
        rating:
          type: number
          description: Rating value (0.5 step, 0.5–5).
        count:
          type: integer

    MonthBucket:
      type: object
      required: [month, books_read, pages_read]
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
        books_read:
          type: integer
        pages_read:
          type: integer

    YearBucket:
      type: object
      required: [year, books_read, pages_read]
      properties:
        year:
          type: integer
        books_read:
          type: integer
        pages_read:
          type: integer

    PeriodBookSummary:
      type: object
      required: [id, title, authors, cover_image_url, finished_on]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        authors:
          type: string
        cover_image_url:
          oneOf:
            - type: string
            - type: 'null'
        finished_on:
          type: string
          format: date
          description: ISO date when the book was marked finished in the period.

    StatsInsight:
      type: object
      required: [id, kind, title, body]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - volume_delta
            - genre_trend
            - format_mix
            - pages_milestone
            - rating_pattern
            - other
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true

    MonthlyStatsResponse:
      type: object
      required:
        - year
        - month
        - books_read
        - pages_read
        - average_rating
        - genre_distribution
        - format_distribution
        - predominant_format
        - audience_distribution
        - rating_distribution
        - monthly_breakdown
        - books_in_period
        - insights
      properties:
        year:
          type: integer
        month:
          type: integer
        books_read:
          type: integer
        pages_read:
          type: integer
        average_rating:
          oneOf:
            - type: number
            - type: 'null'
          description: Mean rating over rated books, rounded to two decimals; null when none rated.
        genre_distribution:
          type: array
          items:
            $ref: '#/components/schemas/GenreCount'
        format_distribution:
          type: array
          items:
            $ref: '#/components/schemas/FormatCount'
        predominant_format:
          oneOf:
            - type: string
            - type: 'null'
          description: Most frequent non-unknown format; null when no format recorded.
        audience_distribution:
          type: array
          items:
            $ref: '#/components/schemas/AudienceCount'
        rating_distribution:
          type: array
          items:
            $ref: '#/components/schemas/RatingCount'
        monthly_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/MonthBucket'
          description: Twelve month buckets for the response year (bar charts in month mode).
        books_in_period:
          type: array
          items:
            $ref: '#/components/schemas/PeriodBookSummary'
          description: Books finished in the requested month, ordered by finished_on ascending.
        insights:
          type: array
          items:
            $ref: '#/components/schemas/StatsInsight'
          description: Deterministic automatic insights for the period; empty when no qualifying books.

    YearlyStatsResponse:
      type: object
      required:
        - year
        - books_read
        - pages_read
        - average_rating
        - genre_distribution
        - format_distribution
        - predominant_format
        - audience_distribution
        - rating_distribution
        - yearly_breakdown
        - books_in_period
        - insights
      properties:
        year:
          type: integer
        books_read:
          type: integer
        pages_read:
          type: integer
        average_rating:
          oneOf:
            - type: number
            - type: 'null'
        genre_distribution:
          type: array
          items:
            $ref: '#/components/schemas/GenreCount'
        format_distribution:
          type: array
          items:
            $ref: '#/components/schemas/FormatCount'
        predominant_format:
          oneOf:
            - type: string
            - type: 'null'
        audience_distribution:
          type: array
          items:
            $ref: '#/components/schemas/AudienceCount'
        rating_distribution:
          type: array
          items:
            $ref: '#/components/schemas/RatingCount'
        yearly_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/YearBucket'
          description: Books and pages per calendar year up to the selected year (bar charts in year mode).
        books_in_period:
          type: array
          items:
            $ref: '#/components/schemas/PeriodBookSummary'
          description: Books finished in the requested year, ordered by finished_on ascending.
        insights:
          type: array
          items:
            $ref: '#/components/schemas/StatsInsight'
          description: Deterministic automatic insights for the period; empty when no qualifying books.

    GoodreadsParsedRow:
      type: object
      required:
        - row_number
        - book_id
        - title
        - author
        - exclusive_shelf
      properties:
        row_number:
          type: integer
        book_id:
          type: string
        title:
          type: string
        author:
          type: string
        additional_authors:
          type: string
        isbn:
          oneOf:
            - type: string
            - type: 'null'
        isbn13:
          oneOf:
            - type: string
            - type: 'null'
        my_rating:
          type: string
        average_rating:
          type: string
        publisher:
          type: string
        binding:
          type: string
        number_of_pages:
          type: string
        year_published:
          type: string
        original_publication_year:
          type: string
        date_read:
          type: string
        date_added:
          type: string
        exclusive_shelf:
          type: string
        read_count:
          type: string
        bookshelves:
          type: string

    GoodreadsParseWarning:
      type: object
      required: [code, message]
      properties:
        row_number:
          oneOf:
            - type: integer
            - type: 'null'
        code:
          type: string
        message:
          type: string

    GoodreadsParseResponse:
      type: object
      required:
        [rows, mapped_rows, warnings, mapping_warnings, imported, skipped_rows, enrichment_failed, meta]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsParsedRow'
        mapped_rows:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsMappedRow'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsParseWarning'
        mapping_warnings:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsMappingWarning'
        imported:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsImportedRow'
        skipped_rows:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsImportSkippedRow'
        enrichment_failed:
          type: array
          items:
            $ref: '#/components/schemas/GoodreadsEnrichmentFailedRow'
        meta:
          type: object
          required:
            - total_rows
            - parsed_rows
            - skipped_rows
            - mapped_rows
            - imported_count
            - skipped_duplicate_count
            - skipped_invalid_count
            - enrichment_failed_count
          properties:
            total_rows:
              type: integer
            parsed_rows:
              type: integer
            skipped_rows:
              type: integer
              description: CSV rows skipped during parse (column mismatch)
            mapped_rows:
              type: integer
            imported_count:
              type: integer
            skipped_duplicate_count:
              type: integer
            skipped_invalid_count:
              type: integer
            enrichment_failed_count:
              type: integer
              description: Imported rows where catalog enrichment returned no metadata

    GoodreadsEnrichmentFailedRow:
      type: object
      required: [row_number, book_id, code, message]
      properties:
        row_number:
          type: integer
        book_id:
          type: string
          format: uuid
        code:
          type: string
          enum: [ENRICHMENT_CATALOG_MISS]
        message:
          type: string

    ImportJobAcceptedResponse:
      type: object
      required: [job_id, status, phase]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, parsing, importing, enriching, completed, failed]
        phase:
          type: string
          enum: [queued, parsing, importing, enriching, completed, failed]

    ReenrichPendingSummary:
      type: object
      required: [processed, enriched, still_failed]
      properties:
        processed:
          type: integer
          description: Books scanned that were missing genre or cover.
        enriched:
          type: integer
          description: Books where at least one missing field was filled.
        still_failed:
          type: integer
          description: Books where catalog lookup was attempted but returned no usable metadata.

    ImportJobStatusResponse:
      type: object
      required:
        [job_id, status, phase, processed_count, total_count, result, error_message]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, parsing, importing, enriching, completed, failed]
        phase:
          type: string
          enum: [queued, parsing, importing, enriching, completed, failed]
        processed_count:
          type: integer
        total_count:
          type: integer
        result:
          oneOf:
            - $ref: '#/components/schemas/GoodreadsParseResponse'
            - type: 'null'
        error_message:
          oneOf:
            - type: string
            - type: 'null'

    GoodreadsImportBookDraft:
      type: object
      required: [title, authors, data_source]
      properties:
        title:
          type: string
        authors:
          type: string
        isbn10:
          oneOf:
            - type: string
            - type: 'null'
        isbn13:
          oneOf:
            - type: string
            - type: 'null'
        page_count:
          oneOf:
            - type: integer
            - type: 'null'
        publication_year:
          oneOf:
            - type: integer
            - type: 'null'
        data_source:
          type: string
          enum: [goodreads]
        external_provider_id:
          oneOf:
            - type: string
            - type: 'null'

    GoodreadsImportReadingRecordDraft:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pendiente, leyendo, leido, dnf]
        rating:
          oneOf:
            - type: number
            - type: 'null'
        read_format:
          oneOf:
            - type: string
              enum: [fisico, ebook, audio]
            - type: 'null'
        started_on:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        finished_on:
          oneOf:
            - type: string
              format: date
            - type: 'null'

    GoodreadsMappedRow:
      type: object
      required: [row_number, book, reading_record]
      properties:
        row_number:
          type: integer
        book:
          $ref: '#/components/schemas/GoodreadsImportBookDraft'
        reading_record:
          $ref: '#/components/schemas/GoodreadsImportReadingRecordDraft'

    GoodreadsMappingWarning:
      type: object
      required: [row_number, code, message]
      properties:
        row_number:
          type: integer
        code:
          type: string
        message:
          type: string

    GoodreadsImportedRow:
      type: object
      required: [row_number, book_id]
      properties:
        row_number:
          type: integer
        book_id:
          type: string
          format: uuid

    GoodreadsImportSkippedRow:
      type: object
      required: [row_number, code, message]
      properties:
        row_number:
          type: integer
        code:
          type: string
        message:
          type: string
        existing_book_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    BookDuplicateError:
      type: object
      required: [statusCode, message, code, existingBookId]
      properties:
        statusCode:
          type: integer
          example: 409
        message:
          type: string
          example: Book already exists in your library
        code:
          type: string
          example: BOOK_DUPLICATE
        existingBookId:
          type: string
          format: uuid
